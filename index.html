<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cloud Arcade</h1>
        <p>A collection of open-source web games.</p>
    </header>

    <main class="game-grid">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Game Thumbnail">
            <h3>Space Explorer</h3>
            <p>Navigate through the stars in this retro flyer.</p>
            <a href="games/space-explorer/index.html" class="play-btn">Play Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Game Thumbnail">
            <h3>Brick Breaker</h3>
            <p>The classic arcade experience, rebuilt for web.</p>
            <a href="games/brick-breaker/index.html" class="play-btn">Play Now</a>
        </div>
    </main>

    <footer>
        <p>Built with ❤️ on GitHub</p>
    </footer>
</body>
</html>
